    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root { color-scheme: dark; background: #07050d; }
      html, body, #root { min-height: 100%; }
      html {
        background:
          radial-gradient(circle at 50% 28%, rgba(129, 92, 248, 0.24) 0%, rgba(129, 92, 248, 0.08) 24%, transparent 44%),
          radial-gradient(circle at 18% 72%, rgba(94, 58, 186, 0.20) 0%, transparent 32%),
          radial-gradient(circle at 80% 68%, rgba(49, 93, 196, 0.14) 0%, transparent 34%),
          linear-gradient(180deg, #05040a 0%, #090611 42%, #06050c 100%);
      }
      body {
        position: relative;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 52% 34%, rgba(90, 44, 170, 0.26) 0%, transparent 32%),
          radial-gradient(circle at 30% 76%, rgba(64, 25, 130, 0.20) 0%, transparent 34%),
          linear-gradient(180deg, #05040a 0%, #090611 42%, #06050c 100%);
      }
      body::before {
        content: "";
        position: fixed;
        inset: -14%;
        pointer-events: none;
        z-index: -2;
        background:
          radial-gradient(circle at 50% 34%, rgba(167, 139, 250, 0.26) 0%, rgba(129, 92, 248, 0.12) 20%, transparent 48%),
          radial-gradient(circle at 24% 74%, rgba(99, 102, 241, 0.18) 0%, transparent 34%),
          radial-gradient(circle at 78% 64%, rgba(59, 130, 246, 0.14) 0%, transparent 36%);
        filter: blur(64px);
        opacity: 0;
        animation: bootPulse 14s 0.6s ease-in-out infinite alternate, bootFadeIn 0.6s 0.3s ease-out forwards;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -1;
        opacity: 0;
        background:
          radial-gradient(circle at 42% 36%, rgba(255,255,255,0.08) 0%, transparent 22%),
          radial-gradient(circle at 60% 58%, rgba(139,92,246,0.14) 0%, transparent 20%),
          radial-gradient(circle at 38% 74%, rgba(59,130,246,0.10) 0%, transparent 16%),
          repeating-linear-gradient(115deg, rgba(255,255,255,0.028) 0 2px, transparent 2px 28px);
        mix-blend-mode: screen;
        animation: bootFadeInSubtle 0.5s 0.4s ease-out forwards;
      }
      #root {
        position: relative;
        isolation: isolate;
      }
      @keyframes bootPulse {
        0% { transform: scale(1) translate3d(0, 0, 0); opacity: 0.82; }
        50% { transform: scale(1.03) translate3d(0, -1%, 0); opacity: 0.96; }
        100% { transform: scale(1.06) translate3d(0, 1%, 0); opacity: 0.86; }
      }
      @keyframes bootFadeIn {
        from { opacity: 0; }
        to { opacity: 0.82; }
      }
      @keyframes bootFadeInSubtle {
        from { opacity: 0; }
        to { opacity: 0.16; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
